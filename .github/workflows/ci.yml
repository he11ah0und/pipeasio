name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - name: Install toolchain
        run: pacman -Syu --noconfirm gcc cmake ninja pkgconf git clang wine libpipewire pipewire qt6-base
      - name: Checkout
        uses: actions/checkout@v4
      - name: Format check (core tree only; tests/ are intentionally hand-aligned)
        run: clang-format --dry-run --Werror src/*.c include/*.h gui/*.cpp gui/*.hpp
      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build
      - name: Test
        run: ctest --test-dir build --output-on-failure
      - name: Show test log on failure
        if: failure()
        run: cat build/Testing/Temporary/LastTest.log || true

  build-32bit:
    name: 32-bit WoW64 build
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - name: Install toolchain (with 32-bit glibc for the ABI layout assert)
        run: |
          printf '[multilib]\nInclude = /etc/pacman.d/mirrorlist\n' >> /etc/pacman.conf
          pacman -Syu --noconfirm gcc cmake ninja pkgconf git wine libpipewire pipewire qt6-base mingw-w64-gcc lib32-glibc
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure (BUILD_WOW64_32=ON)
        run: cmake -B build32 -G Ninja -DCMAKE_BUILD_TYPE=Release -DBUILD_WOW64_32=ON -DWINE_LIB_ROOT=/usr/lib/wine
      - name: Build (64-bit + 32-bit WoW64)
        run: cmake --build build32
      - name: Test
        run: ctest --test-dir build32 --output-on-failure
      - name: Show test log on failure
        if: failure()
        run: cat build32/Testing/Temporary/LastTest.log || true
